name: Godot CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GODOT_VERSION: "4.3"
  EXPORT_NAME:   "RagnaRune"
  PROJECT_PATH:  "."
  GUT_VERSION:   "v9.3.0"

jobs:
  # ── 1. Import + unit tests ────────────────────────────────────────────────────
  test:
    name: GUT tests
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.3

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      # Install GUT BEFORE the import step so Godot sees it as a known addon.
      - name: Install GUT addon
        run: |
          mkdir -p addons
          curl -L \
            "https://github.com/bitwes/Gut/releases/download/${GUT_VERSION}/gut_${GUT_VERSION}.zip" \
            -o gut.zip
          unzip -q gut.zip -d addons/
          rm gut.zip
          ls addons/gut/gut_cmdln.gd   # fail fast if zip layout changed

      # An empty tests/ dir is fine — GUT exits 0 when no test files are found.
      - name: Ensure tests directory exists
        run: mkdir -p tests

      - name: Cache Godot import cache
        uses: actions/cache@v4
        with:
          path: .godot
          key: godot-import-${{ env.GUT_VERSION }}-${{ hashFiles('**/*.gd','**/*.tscn','**/*.tres') }}
          restore-keys: |
            godot-import-${{ env.GUT_VERSION }}-
            godot-import-

      # Must import at least once so res:// paths resolve correctly.
      - name: Import project assets
        run: godot --headless --import 2>&1 | tail -20 || true

      - name: Run GUT tests
        run: |
          godot --headless \
            -s addons/gut/gut_cmdln.gd \
            -gdir=res://tests/ \
            -ginclude_subdirs \
            -gprefix=test_ \
            -gsuffix=.gd \
            -gexit \
            2>&1 | tee gut_output.txt

          EXIT=${PIPESTATUS[0]}
          # GUT exit 1 = test failures (still useful). Anything higher = crash.
          if grep -q "ERROR:" gut_output.txt && [ "$EXIT" -gt 1 ]; then
            echo "::error::Godot crashed or GUT could not load."
            exit "$EXIT"
          fi
          exit "$EXIT"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: gut_output.txt
          retention-days: 14

  # ── 2. Export builds (main-branch pushes only, after tests pass) ───────────────
  export:
    name: Export (${{ matrix.platform }})
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.3
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: Linux
            preset:   "Linux/X11"
            out_dir:  builds/linux
            out_file: RagnaRune.x86_64

          - platform: Windows
            preset:   "Windows Desktop"
            out_dir:  builds/windows
            out_file: RagnaRune.exe

          - platform: Web
            preset:   "Web"
            out_dir:  builds/web
            out_file: RagnaRune.html

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install GUT addon
        run: |
          mkdir -p addons
          curl -L \
            "https://github.com/bitwes/Gut/releases/download/${GUT_VERSION}/gut_${GUT_VERSION}.zip" \
            -o gut.zip
          unzip -q gut.zip -d addons/
          rm gut.zip

      - name: Cache Godot import cache
        uses: actions/cache@v4
        with:
          path: .godot
          key: godot-import-${{ env.GUT_VERSION }}-${{ hashFiles('**/*.gd','**/*.tscn','**/*.tres') }}
          restore-keys: |
            godot-import-${{ env.GUT_VERSION }}-
            godot-import-

      - name: Import project assets
        run: godot --headless --import 2>&1 | tail -20 || true

      - name: Create output directory
        run: mkdir -p ${{ matrix.out_dir }}

      - name: Export ${{ matrix.platform }}
        run: |
          godot --headless \
            --export-release "${{ matrix.preset }}" \
            "${{ matrix.out_dir }}/${{ matrix.out_file }}" \
            2>&1

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Build-${{ matrix.platform }}
          path: ${{ matrix.out_dir }}
          retention-days: 7

  # ── 3. Deploy Web → GitHub Pages ───────────────────────────────────────────────
  deploy-web:
    name: Deploy Web → GitHub Pages
    needs: export
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download Web build
        uses: actions/download-artifact@v4
        with:
          name: Build-Web
          path: web-build

      # Godot Web exports need SharedArrayBuffer, which requires COOP/COEP headers.
      # GitHub Pages can't set custom headers, so we inject a service-worker shim.
      - name: Inject COOP/COEP service-worker shim
        run: |
          cat > web-build/coi-serviceworker.js << 'EOF'
          self.addEventListener("install",()=>self.skipWaiting());
          self.addEventListener("activate",e=>e.waitUntil(self.clients.claim()));
          self.addEventListener("fetch",e=>{
            if(e.request.cache==="only-if-cached"&&e.request.mode!=="same-origin")return;
            e.respondWith(fetch(e.request,{cache:"no-store"}).then(r=>{
              if(r.status===0)return r;
              const h=new Headers(r.headers);
              h.set("Cross-Origin-Opener-Policy","same-origin");
              h.set("Cross-Origin-Embedder-Policy","require-corp");
              return new Response(r.body,{status:r.status,statusText:r.statusText,headers:h});
            }));
          });
          EOF
          sed -i 's|</head>|<script>if(!self.crossOriginIsolated){const s=document.createElement("script");s.src="coi-serviceworker.js";document.head.appendChild(s);}</script></head>|' \
            web-build/RagnaRune.html || true

      - name: Add .nojekyll
        run: touch web-build/.nojekyll

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir:  web-build
          publish_branch: gh-pages
