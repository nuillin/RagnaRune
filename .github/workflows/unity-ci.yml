name: Unity CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Cancel in-progress runs on the same branch when a new push arrives.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Run edit-mode + play-mode tests ──────────────────────────────────────
  test:
    name: Test (${{ matrix.testMode }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        testMode: [ editmode, playmode ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-test-${{ matrix.testMode }}-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-test-${{ matrix.testMode }}-
            Library-

      - name: Run ${{ matrix.testMode }} tests
        uses: game-ci/unity-test-runner@v4.3.1
        env:
          UNITY_LICENSE:      ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL:        ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD:     ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion:       auto
          testMode:           ${{ matrix.testMode }}
          artifactsPath:      test-results/${{ matrix.testMode }}
          githubToken:        ${{ secrets.GITHUB_TOKEN }}
          checkName:          "${{ matrix.testMode }} test results"
          coverageOptions:    generateAdditionalMetrics;generateHtmlReport;generateBadgeReport

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.testMode }}
          path: test-results/${{ matrix.testMode }}
          retention-days: 14

  # ── 2. Build (only on push to main, after tests pass) ───────────────────────
  build:
    name: Build (${{ matrix.targetPlatform }})
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        targetPlatform:
          - StandaloneLinux64
          - StandaloneWindows64
          - WebGL

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-build-${{ matrix.targetPlatform }}-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-build-${{ matrix.targetPlatform }}-
            Library-

      - name: Build ${{ matrix.targetPlatform }}
        uses: game-ci/unity-builder@v4.8.1
        env:
          UNITY_LICENSE:      ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL:        ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD:     ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion:       auto
          targetPlatform:     ${{ matrix.targetPlatform }}
          buildName:          RagnaRune
          buildsPath:         builds
          versioning:         Semantic

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Build-${{ matrix.targetPlatform }}
          path: builds/${{ matrix.targetPlatform }}
          retention-days: 7

  # ── 3. Deploy WebGL to GitHub Pages (optional) ──────────────────────────────
  deploy-webgl:
    name: Deploy WebGL → GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write   # needed for peaceiris/actions-gh-pages

    steps:
      - name: Download WebGL build
        uses: actions/download-artifact@v4
        with:
          name: Build-WebGL
          path: webgl-build

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir:  webgl-build
          publish_branch: gh-pages
