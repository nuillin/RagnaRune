name: Manual Web Export & Deploy

on:
  workflow_dispatch:

env:
  GODOT_VERSION: "4.3"
  GUT_VERSION: "v9.3.0"

jobs:
  export_and_deploy:
    name: Export (Web) and Deploy
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.3
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install GUT addon
        run: |
          mkdir -p addons
          git clone --quiet --depth 1 --branch ${GUT_VERSION} https://github.com/bitwes/Gut.git /tmp/gut
          mv /tmp/gut/addons/gut addons/gut

      - name: Import project assets
        run: godot --headless --import 2>&1 | tail -20 || true

      - name: Create output directory
        run: mkdir -p builds/web

      - name: Export Web
        run: |
          if [ ! -f export_presets.cfg ]; then
            echo "::error::export_presets.cfg missing — cannot export Web."
            exit 1
          fi
          godot --headless --export-release "Web" "builds/web/RagnaRune.html" 2>&1

      - name: Inject COOP/COEP service-worker shim
        run: |
          cat > builds/web/coi-serviceworker.js << 'EOF'
          self.addEventListener("install",()=>self.skipWaiting());
          self.addEventListener("activate",e=>e.waitUntil(self.clients.claim()));
          self.addEventListener("fetch",e=>{
            if(e.request.cache==="only-if-cached"&&e.request.mode!=="same-origin")return;
            e.respondWith(fetch(e.request,{cache:"no-store"}).then(r=>{
              if(r.status===0)return r;
              const h=new Headers(r.headers);
              h.set("Cross-Origin-Opener-Policy","same-origin");
              h.set("Cross-Origin-Embedder-Policy","require-corp");
              return new Response(r.body,{status:r.status,statusText:r.statusText,headers:h});
            }));
          });
          EOF
          sed -i 's|</head>|<script>if(!self.crossOriginIsolated){const s=document.createElement("script");s.src="coi-serviceworker.js";document.head.appendChild(s);}</script></head>|' \
            builds/web/RagnaRune.html || true

      - name: Add .nojekyll
        run: touch builds/web/.nojekyll

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: builds/web
          publish_branch: gh-pages
